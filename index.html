  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      font-family: Montserrat, sans-serif;
      background: #FFFFFF;
      color: #0A1E3A;
      overflow-x: hidden;
    }

    img { max-width: 100%; height: auto; }

    ins.adsbygoogle {

    header {
      background: #0A1E3A;
      padding: 10px 30px;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-container img { height: 34px; }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: #FFFFFF;
      text-decoration: none;
    }

    .sports-menu {
      background: #FFFFFF;
      padding: 15px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      border-bottom: 1px solid #E5E5E5;
      position: sticky;
      top: 54px;
      z-index: 999;
    }

    .sports-menu a {
      flex: 1 1 120px;
      max-width: 150px;
      text-align: center;
      padding: 12px 8px;
      border: 1px solid #1E4BA5;
      border-radius: 10px;
      color: #1E4BA5;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
    }

    .sports-menu a.active {
      background: #1E4BA5;
      color: #FFFFFF;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 10px 40px;
    }

    .layout {
      display: grid;
      grid-template-columns: 2.3fr 330px;
      gap: 20px;
      align-items: start;
    }

    .layout > * { min-width: 0; }

    .card {
      background: #FFFFFF;
      border: 1px solid #E5E5E5;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
    }

    .news-title,
    .news-title a,
    .subhead,
    .news-list a {
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .ad-slot {
      border: 1px dashed #C9D3E2;
      border-radius: 14px;
      padding: 22px;
      background: #F7FAFF;
    }

    @media (max-width: 1024px) {
      .layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .sports-menu {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .sports-menu a {
        white-space: normal;
        font-size: 13px;
      }
    }
  </style>
